name: Release Linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux tar.gz
    runs-on: ubuntu-22.04

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9] ]]; then
            echo "Release tags must start with v followed by a version number, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "archive=miaosic-linux-x64-$tag.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libgtk-3-dev \
            liblzma-dev \
            libsqlite3-dev \
            ninja-build \
            pkg-config

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        shell: bash
        run: |
          mkdir -p dist
          rm -rf dist/miaosic-linux-x64
          cp -a build/linux/x64/release/bundle dist/miaosic-linux-x64
          tar -C dist -czf "dist/${{ steps.release.outputs.archive }}" miaosic-linux-x64
          sha256sum "dist/${{ steps.release.outputs.archive }}" > "dist/${{ steps.release.outputs.archive }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: miaosic-linux-x64-${{ steps.release.outputs.tag }}
          path: |
            dist/${{ steps.release.outputs.archive }}
            dist/${{ steps.release.outputs.archive }}.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Miaosic ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/${{ steps.release.outputs.archive }}
            dist/${{ steps.release.outputs.archive }}.sha256
